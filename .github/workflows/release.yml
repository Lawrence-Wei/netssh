name: Release

on:
  push:
    tags:
      - 'v*'
  workflow_dispatch:
    inputs:
      tag:
        description: 'Release tag (for manual run, e.g. v1.1.10)'
        required: false
        default: ''

permissions:
  contents: write
  packages: write

jobs:
  # ── 测试闸门 ── 任何一步失败都不会触发后续构建，避免浪费 runner 资源 ──
  test:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 'lts/*'

      - name: Install Rust
        uses: dtolnay/rust-toolchain@stable

      - name: Install Linux system dependencies (required by Tauri crates)
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            libwebkit2gtk-4.1-dev \
            libgtk-3-dev \
            libayatana-appindicator3-dev \
            librsvg2-dev \
            libssl-dev \
            libglib2.0-dev \
            libsoup-3.0-dev \
            libjavascriptcoregtk-4.1-dev

      - name: Install dependencies
        run: npm ci

      - name: Lint
        run: npm run lint

      - name: Type check
        run: npx tsc --noEmit

      - name: Frontend tests
        run: npm test -- --run

      - name: Rust tests
        run: cargo test --manifest-path src-tauri/Cargo.toml

  # ── Windows 构建 ──
  build-windows:
    needs: test
    runs-on: windows-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 'lts/*'

      - name: Install dependencies
        run: npm install

      - name: Install Rust
        uses: dtolnay/rust-toolchain@stable

      - name: Install Windows targets
        run: |
          rustup target add x86_64-pc-windows-msvc
          rustup target add aarch64-pc-windows-msvc

      - name: Build Windows x64
        run: npm run tauri:build -- --target x86_64-pc-windows-msvc

      - name: Build Windows arm64
        run: npm run tauri:build -- --target aarch64-pc-windows-msvc

      - name: Collect artifacts
        shell: bash
        run: |
          mkdir -p release-artifacts
          for target in x86_64-pc-windows-msvc aarch64-pc-windows-msvc; do
            for pkg in msi nsis; do
              src_dir="src-tauri/target/${target}/release/bundle/${pkg}"
              if [ -d "${src_dir}" ]; then
                mkdir -p "release-artifacts/${target}/${pkg}"
                cp -v ${src_dir}/* release-artifacts/${target}/${pkg}/
              fi
            done
          done
          if [ ! "$(find release-artifacts -type f | head -n 1)" ]; then
            echo "No installer files were produced"
            exit 1
          fi

      - name: Upload artifacts
        uses: actions/upload-artifact@v4
        with:
          name: netssh-windows
          path: release-artifacts/

  # ── macOS 构建 ──
  build-macos:
    needs: test
    runs-on: macos-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 'lts/*'

      - name: Install dependencies
        run: npm install

      - name: Install Rust
        uses: dtolnay/rust-toolchain@stable

      - name: Install Apple targets
        run: |
          rustup target add x86_64-apple-darwin
          rustup target add aarch64-apple-darwin

      - name: Build macOS x86_64
        run: npm run tauri:build -- --target x86_64-apple-darwin

      - name: Build macOS aarch64
        run: npm run tauri:build -- --target aarch64-apple-darwin

      - name: Build macOS universal
        run: npm run tauri:build -- --target universal-apple-darwin

      - name: Collect artifacts
        run: |
          mkdir -p release-artifacts
          for target in x86_64-apple-darwin aarch64-apple-darwin universal-apple-darwin; do
            target_dir="src-tauri/target/${target}/release/bundle/dmg"
            if [ -d "${target_dir}" ]; then
              cp -v ${target_dir}/*.dmg release-artifacts/
            fi
          done
          if [ ! "$(find release-artifacts -type f | head -n 1)" ]; then
            echo "No dmg files were produced"
            exit 1
          fi
          find release-artifacts -type f -print

      - name: Upload artifacts
        uses: actions/upload-artifact@v4
        with:
          name: netssh-macos
          path: release-artifacts/

  # ── Linux x64 构建 ──
  build-linux-x64:
    needs: test
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 'lts/*'

      - name: Install system dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            libwebkit2gtk-4.1-dev \
            libayatana-appindicator3-dev \
            librsvg2-dev \
            patchelf \
            libgtk-3-dev \
            libsoup-3.0-dev \
            libjavascriptcoregtk-4.1-dev

      - name: Install dependencies
        run: npm install

      - name: Install Rust
        uses: dtolnay/rust-toolchain@stable

      - name: Build Linux x64
        run: npm run tauri:build -- --target x86_64-unknown-linux-gnu

      - name: Collect artifacts
        run: |
          mkdir -p release-artifacts/linux-x64
          src_dir="src-tauri/target/x86_64-unknown-linux-gnu/release/bundle"
          if [ -d "${src_dir}/deb" ]; then
            cp -v ${src_dir}/deb/*.deb release-artifacts/linux-x64/
          fi
          if [ -d "${src_dir}/appimage" ]; then
            cp -v ${src_dir}/appimage/*.AppImage release-artifacts/linux-x64/
          fi
          if [ ! "$(find release-artifacts/linux-x64 -type f | head -n 1)" ]; then
            echo "No linux-x64 packages were produced"
            exit 1
          fi
          find release-artifacts -type f -print

      - name: Upload artifacts
        uses: actions/upload-artifact@v4
        with:
          name: netssh-linux-x64
          path: release-artifacts/

  # ── Linux ARM64 (树莓派) 构建 ──
  build-linux-arm64:
    needs: test
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 'lts/*'

      - name: Install system dependencies (amd64 host + arm64 cross)
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            libwebkit2gtk-4.1-dev \
            libayatana-appindicator3-dev \
            librsvg2-dev \
            patchelf \
            libgtk-3-dev \
            libsoup-3.0-dev \
            libjavascriptcoregtk-4.1-dev

      - name: Install ARM64 cross-compile packages
        run: |
          sudo dpkg --add-architecture arm64
          # 默认源仅拉 amd64，避免 arm64 在非 ports 源（如 security.ubuntu.com）上 404
          if [ -f /etc/apt/sources.list.d/ubuntu.sources ]; then
            sudo sed -i '/^Suites: /a Architectures: amd64' /etc/apt/sources.list.d/ubuntu.sources
          fi
          # 新建独立的 arm64 源指向 ports.ubuntu.com
          printf '%s\n' \
            'Types: deb' \
            'Architectures: arm64' \
            'URIs: http://ports.ubuntu.com/ubuntu-ports' \
            'Suites: noble noble-updates noble-security noble-backports' \
            'Components: main restricted universe multiverse' \
            'Signed-By: /usr/share/keyrings/ubuntu-archive-keyring.gpg' \
            | sudo tee /etc/apt/sources.list.d/arm64-cross.sources >/dev/null
          sudo apt-get update
          # 先把 amd64 的 dev 包更新到最新，避免和 arm64 版本不一致导致文件冲突
          sudo apt-get install -y \
            libwebkit2gtk-4.1-dev:amd64 \
            libgtk-3-dev:amd64 \
            libsoup-3.0-dev:amd64 \
            libjavascriptcoregtk-4.1-dev:amd64 \
            libayatana-appindicator3-dev:amd64 \
            librsvg2-dev:amd64 \
            libssl-dev:amd64
          # 然后安装 arm64 交叉编译依赖
          sudo apt-get install -y \
            libwebkit2gtk-4.1-dev:arm64 \
            libgtk-3-dev:arm64 \
            libsoup-3.0-dev:arm64 \
            libjavascriptcoregtk-4.1-dev:arm64 \
            libayatana-appindicator3-dev:arm64 \
            librsvg2-dev:arm64 \
            libssl-dev:arm64 \
            gcc-aarch64-linux-gnu

      - name: Install dependencies
        run: npm install

      - name: Install Rust
        uses: dtolnay/rust-toolchain@stable

      - name: Install ARM64 target
        run: rustup target add aarch64-unknown-linux-gnu

      - name: Build Linux ARM64
        env:
          PKG_CONFIG_PATH: /usr/lib/aarch64-linux-gnu/pkgconfig
          PKG_CONFIG_ALLOW_CROSS: "1"
          CARGO_TARGET_AARCH64_UNKNOWN_LINUX_GNU_LINKER: aarch64-linux-gnu-gcc
          CC: aarch64-linux-gnu-gcc
        run: npm run tauri:build -- --target aarch64-unknown-linux-gnu

      - name: Collect artifacts
        run: |
          mkdir -p release-artifacts/linux-arm64
          src_dir="src-tauri/target/aarch64-unknown-linux-gnu/release/bundle"
          if [ -d "${src_dir}/deb" ]; then
            cp -v ${src_dir}/deb/*.deb release-artifacts/linux-arm64/
          fi
          if [ -d "${src_dir}/appimage" ]; then
            cp -v ${src_dir}/appimage/*.AppImage release-artifacts/linux-arm64/
          fi
          if [ ! "$(find release-artifacts/linux-arm64 -type f | head -n 1)" ]; then
            echo "No linux-arm64 packages were produced"
            exit 1
          fi
          find release-artifacts -type f -print

      - name: Upload artifacts
        uses: actions/upload-artifact@v4
        with:
          name: netssh-linux-arm64
          path: release-artifacts/

  # ── npm 包发布 ──
  publish-npm:
    needs: test
    runs-on: ubuntu-latest
    if: ${{ github.ref_type == 'tag' || (github.event_name == 'workflow_dispatch' && github.event.inputs.tag != '') }}
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 'lts/*'

      - name: Prepare package metadata
        env:
          TAG_NAME: ${{ github.event_name == 'workflow_dispatch' && github.event.inputs.tag || github.ref_name }}
          OWNER_NAME: ${{ github.repository_owner }}
        run: |
          OWNER="${OWNER_NAME,,}"
          VERSION="${TAG_NAME#v}"
          export OWNER VERSION
          if [ -z "$VERSION" ] || [ "$VERSION" = "$TAG_NAME" ]; then
            VERSION="$(node -p "require('./package.json').version")"
          fi

          node -e '
            const fs = require("fs");
            const path = "./package.json";
            const pkg = JSON.parse(fs.readFileSync(path, "utf8"));
            pkg.private = false;
            pkg.name = "@'"${OWNER}"'/netssh";
            pkg.version = "'"${VERSION}"'";
            fs.writeFileSync(path, JSON.stringify(pkg, null, 2) + "\n");
          '

          echo "PACKAGE_NAME=@${OWNER}/netssh" >> "$GITHUB_ENV"
          echo "PACKAGE_VERSION=$VERSION" >> "$GITHUB_ENV"

      - name: Configure npm for GitHub Packages
        run: |
          PACKAGE_SCOPE="${PACKAGE_NAME%@*}"
          PACKAGE_SCOPE="${PACKAGE_SCOPE#@}"
          npm config set "@${PACKAGE_SCOPE}:registry" https://npm.pkg.github.com
          npm config set //npm.pkg.github.com/:_authToken "${{ secrets.GITHUB_TOKEN }}"

      - name: Publish package to GitHub Packages
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          if npm view "${{ env.PACKAGE_NAME }}@${{ env.PACKAGE_VERSION }}" --registry https://npm.pkg.github.com >/dev/null 2>&1; then
            echo "Package ${PACKAGE_NAME}@${PACKAGE_VERSION} already exists; skip publish."
          else
            npm publish --registry https://npm.pkg.github.com --access restricted --ignore-scripts
          fi

          npm dist-tag add "${{ env.PACKAGE_NAME }}@${{ env.PACKAGE_VERSION }}" latest --registry https://npm.pkg.github.com

  # ── 合并产物并发布 GitHub Release ──
  create-release:
    needs: [build-windows, build-macos, build-linux-x64, build-linux-arm64, publish-npm]
    runs-on: ubuntu-latest
    if: ${{ github.ref_type == 'tag' || (github.event_name == 'workflow_dispatch' && github.event.inputs.tag != '') }}
    steps:
      - name: Download Windows artifacts
        uses: actions/download-artifact@v4
        with:
          name: netssh-windows
          path: release-artifacts/

      - name: Download macOS artifacts
        uses: actions/download-artifact@v4
        with:
          name: netssh-macos
          path: release-artifacts/

      - name: Download Linux x64 artifacts
        uses: actions/download-artifact@v4
        with:
          name: netssh-linux-x64
          path: release-artifacts/

      - name: Download Linux ARM64 artifacts
        uses: actions/download-artifact@v4
        with:
          name: netssh-linux-arm64
          path: release-artifacts/

      - name: Publish GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ github.event_name == 'workflow_dispatch' && github.event.inputs.tag || github.ref_name }}
          target_commitish: ${{ github.event_name == 'workflow_dispatch' && github.event.inputs.tag || github.sha }}
          files: |
            release-artifacts/**
          fail_on_unmatched_files: true
          generate_release_notes: true
