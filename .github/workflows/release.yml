name: Release

on:
  push:
    branches:
      - main
    tags:
      - 'v*'
  pull_request:
    branches:
      - main
  workflow_dispatch:
    # 手动触发用于补发 release 时直接指定 tag，例如 v1.1.11
    inputs:
      tag:
        description: 'Release tag (for manual run, e.g. v1.1.10)'
        required: false
        default: ''

permissions:
  contents: write
  packages: write

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  # ── 测试闸门 ── 任何一步失败都不会触发后续构建，避免浪费 runner 资源 ──
  test:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 'lts/*'

      - name: Install Rust
        uses: dtolnay/rust-toolchain@stable

      - name: Install Linux system dependencies (required by Tauri crates)
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            libwebkit2gtk-4.1-dev \
            libgtk-3-dev \
            libayatana-appindicator3-dev \
            librsvg2-dev \
            libssl-dev \
            libglib2.0-dev \
            libsoup-3.0-dev \
            libjavascriptcoregtk-4.1-dev \
            libudev-dev

      - name: Install dependencies
        run: npm ci

      - name: Lint
        run: npm run lint

      - name: Type check
        run: npx tsc --noEmit

      - name: Frontend tests
        run: npm test -- --run

      - name: Rust tests
        run: cargo test --manifest-path src-tauri/Cargo.toml

  # ── Windows 构建 ──
  build-windows:
    needs: test
    if: ${{ github.ref_type == 'tag' || (github.event_name == 'workflow_dispatch' && github.event.inputs.tag != '') }}
    runs-on: windows-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 'lts/*'

      - name: Install dependencies
        run: npm install

      - name: Install Rust
        uses: dtolnay/rust-toolchain@stable

      - name: Install Windows targets
        run: |
          rustup target add x86_64-pc-windows-msvc
          rustup target add aarch64-pc-windows-msvc

      - name: Sync release version into tauri metadata
        if: ${{ github.ref_type == 'tag' || (github.event_name == 'workflow_dispatch' && github.event.inputs.tag != '') }}
        shell: bash
        run: |
          VERSION="${{ github.event_name == 'workflow_dispatch' && github.event.inputs.tag || github.ref_name }}"
          VERSION="${VERSION#v}"
          export VERSION
          if [ -z "$VERSION" ] || [ "$VERSION" = "main" ]; then
            echo "skip: non-tag build"
            exit 0
          fi
          node - <<'EOF'
          const fs = require("fs");

          const version = (() => {
            const value = process.env.VERSION || "";
            return value.replace(/^v/, "");
          })();
          if (!version) {
            process.exit(0);
          }

          const confPath = "src-tauri/tauri.conf.json";
          const conf = JSON.parse(fs.readFileSync(confPath, "utf8"));
          conf.version = version;
          fs.writeFileSync(confPath, JSON.stringify(conf, null, 2) + "\n", "utf8");

          const cargoPath = "src-tauri/Cargo.toml";
          const cargo = fs.readFileSync(cargoPath, "utf8").replace(
            /^version\s*=\s*".*?"/m,
            `version = "${version}"`
          );
          fs.writeFileSync(cargoPath, `${cargo}\n`, "utf8");
          EOF

      - name: Build Windows x64
        run: npm run tauri:build -- --target x86_64-pc-windows-msvc

      - name: Build Windows arm64
        run: npm run tauri:build -- --target aarch64-pc-windows-msvc

      - name: Collect artifacts
        shell: bash
        run: |
          mkdir -p release-artifacts
          for target in x86_64-pc-windows-msvc aarch64-pc-windows-msvc; do
            for pkg in msi nsis; do
              src_dir="src-tauri/target/${target}/release/bundle/${pkg}"
              if [ -d "${src_dir}" ]; then
                mkdir -p "release-artifacts/${target}/${pkg}"
                cp -v ${src_dir}/* release-artifacts/${target}/${pkg}/
              fi
            done
          done
          if [ ! "$(find release-artifacts -type f | head -n 1)" ]; then
            echo "No installer files were produced"
            exit 1
          fi

      - name: Upload artifacts
        uses: actions/upload-artifact@v4
        with:
          name: netssh-windows
          path: release-artifacts/

  # ── macOS 构建 ──
  build-macos:
    needs: test
    if: ${{ github.ref_type == 'tag' || (github.event_name == 'workflow_dispatch' && github.event.inputs.tag != '') }}
    runs-on: macos-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 'lts/*'

      - name: Install dependencies
        run: npm install

      - name: Install Rust
        uses: dtolnay/rust-toolchain@stable

      - name: Sync release version into tauri metadata
        if: ${{ github.ref_type == 'tag' || (github.event_name == 'workflow_dispatch' && github.event.inputs.tag != '') }}
        shell: bash
        run: |
          VERSION="${{ github.event_name == 'workflow_dispatch' && github.event.inputs.tag || github.ref_name }}"
          VERSION="${VERSION#v}"
          export VERSION
          if [ -z "$VERSION" ] || [ "$VERSION" = "main" ]; then
            echo "skip: non-tag build"
            exit 0
          fi
          node - <<'EOF'
          const fs = require("fs");

          const version = (() => {
            const value = process.env.VERSION || "";
            return value.replace(/^v/, "");
          })();
          if (!version) {
            process.exit(0);
          }

          const confPath = "src-tauri/tauri.conf.json";
          const conf = JSON.parse(fs.readFileSync(confPath, "utf8"));
          conf.version = version;
          fs.writeFileSync(confPath, JSON.stringify(conf, null, 2) + "\n", "utf8");

          const cargoPath = "src-tauri/Cargo.toml";
          const cargo = fs.readFileSync(cargoPath, "utf8").replace(
            /^version\s*=\s*".*?"/m,
            `version = "${version}"`
          );
          fs.writeFileSync(cargoPath, `${cargo}\n`, "utf8");
          EOF

      - name: Install Apple targets
        run: |
          rustup target add x86_64-apple-darwin
          rustup target add aarch64-apple-darwin

      - name: Build macOS x86_64
        run: npm run tauri:build -- --target x86_64-apple-darwin

      - name: Build macOS aarch64
        run: npm run tauri:build -- --target aarch64-apple-darwin

      - name: Build macOS universal
        run: npm run tauri:build -- --target universal-apple-darwin

      - name: Collect artifacts
        run: |
          mkdir -p release-artifacts
          for target in x86_64-apple-darwin aarch64-apple-darwin universal-apple-darwin; do
            target_dir="src-tauri/target/${target}/release/bundle/dmg"
            if [ -d "${target_dir}" ]; then
              cp -v ${target_dir}/*.dmg release-artifacts/
            fi
          done
          if [ ! "$(find release-artifacts -type f | head -n 1)" ]; then
            echo "No dmg files were produced"
            exit 1
          fi
          find release-artifacts -type f -print

      - name: Upload artifacts
        uses: actions/upload-artifact@v4
        with:
          name: netssh-macos
          path: release-artifacts/

  # ── npm 包发布 ──
  publish-npm:
    needs: test
    runs-on: ubuntu-latest
    if: ${{ github.ref_type == 'tag' || (github.event_name == 'workflow_dispatch' && github.event.inputs.tag != '') }}
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 'lts/*'

      - name: Prepare package metadata
        env:
          TAG_NAME: ${{ github.event_name == 'workflow_dispatch' && github.event.inputs.tag || github.ref_name }}
          OWNER_NAME: ${{ github.repository_owner }}
        run: |
          OWNER="${OWNER_NAME,,}"
          VERSION="${TAG_NAME#v}"
          export OWNER VERSION
          if [ -z "$VERSION" ] || [ "$VERSION" = "$TAG_NAME" ]; then
            VERSION="$(node -p "require('./package.json').version")"
          fi

          node -e '
            const fs = require("fs");
            const path = "./package.json";
            const pkg = JSON.parse(fs.readFileSync(path, "utf8"));
            pkg.private = false;
            pkg.name = "@'"${OWNER}"'/netssh";
            pkg.version = "'"${VERSION}"'";
            fs.writeFileSync(path, JSON.stringify(pkg, null, 2) + "\n");
          '

          echo "PACKAGE_NAME=@${OWNER}/netssh" >> "$GITHUB_ENV"
          echo "PACKAGE_VERSION=$VERSION" >> "$GITHUB_ENV"

      - name: Configure npm for GitHub Packages
        run: |
          PACKAGE_SCOPE="${PACKAGE_NAME%@*}"
          PACKAGE_SCOPE="${PACKAGE_SCOPE#@}"
          npm config set "@${PACKAGE_SCOPE}:registry" https://npm.pkg.github.com
          npm config set //npm.pkg.github.com/:_authToken "${{ secrets.GITHUB_TOKEN }}"

      - name: Publish package to GitHub Packages
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          if npm view "${{ env.PACKAGE_NAME }}@${{ env.PACKAGE_VERSION }}" --registry https://npm.pkg.github.com >/dev/null 2>&1; then
            echo "Package ${PACKAGE_NAME}@${PACKAGE_VERSION} already exists; skip publish."
          else
            npm publish --registry https://npm.pkg.github.com --access restricted --ignore-scripts
          fi

          npm dist-tag add "${{ env.PACKAGE_NAME }}@${{ env.PACKAGE_VERSION }}" latest --registry https://npm.pkg.github.com

  # ── 合并产物并发布 GitHub Release ──
  create-release:
    needs: [build-windows, build-macos, publish-npm]
    runs-on: ubuntu-latest
    if: ${{ github.ref_type == 'tag' || (github.event_name == 'workflow_dispatch' && github.event.inputs.tag != '') }}
    steps:
      - name: Download Windows artifacts
        uses: actions/download-artifact@v4
        with:
          name: netssh-windows
          path: release-artifacts/

      - name: Download macOS artifacts
        uses: actions/download-artifact@v4
        with:
          name: netssh-macos
          path: release-artifacts/

      - name: Publish GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ github.event_name == 'workflow_dispatch' && github.event.inputs.tag || github.ref_name }}
          target_commitish: ${{ github.sha }}
          files: |
            release-artifacts/**
          fail_on_unmatched_files: true
          generate_release_notes: true

  # ── 发布到 WinGet ──
  publish-winget:
    needs: create-release
    runs-on: ubuntu-latest
    if: ${{ github.ref_type == 'tag' || (github.event_name == 'workflow_dispatch' && github.event.inputs.tag != '') }}
    steps:
      - name: Submit to WinGet
        uses: vedantmgoyal2009/winget-releaser@v2
        with:
          identifier: LawrenceWei.Netssh
          token: ${{ secrets.WINGET_TOKEN }}
          release-tag: ${{ github.event_name == 'workflow_dispatch' && github.event.inputs.tag || github.ref_name }}
