name: release-macos

on:
  push:
    tags:
      - 'v*'
  workflow_dispatch:

permissions:
  contents: write

jobs:
  build-and-release-macos:
    runs-on: macos-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Install dependencies
        run: npm install

      - name: Install Rust
        uses: dtolnay/rust-toolchain@stable

      - name: Install Apple targets
        run: |
          rustup target add x86_64-apple-darwin
          rustup target add aarch64-apple-darwin

      - name: Build macOS x86_64
        run: npm run tauri:build -- --target x86_64-apple-darwin

      - name: Build macOS aarch64
        run: npm run tauri:build -- --target aarch64-apple-darwin

      - name: Build macOS universal
        run: npm run tauri:build -- --target universal-apple-darwin

      - name: Collect artifacts
        run: |
          mkdir -p release-artifacts
          for target in x86_64-apple-darwin aarch64-apple-darwin universal-apple-darwin; do
            target_dir="src-tauri/target/${target}/release/bundle/dmg"
            if [ -d "${target_dir}" ]; then
              mkdir -p "release-artifacts/${target}"
              cp -v ${target_dir}/* release-artifacts/${target}/
            fi
          done
          if [ ! "$(find release-artifacts -type f | head -n 1)" ]; then
            echo "No dmg files were produced"
            exit 1
          fi
          find release-artifacts -maxdepth 3 -type f -print

      - name: Upload artifacts
        uses: actions/upload-artifact@v4
        with:
          name: netssh-macos-artifacts
          path: release-artifacts/

      - name: Publish release (tag)
        if: github.ref_type == 'tag'
        uses: softprops/action-gh-release@v2
        with:
          files: |
            release-artifacts/**
          fail_on_unmatched_files: true
          generate_release_notes: true
